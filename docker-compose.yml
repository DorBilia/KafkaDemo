
services:
  kafka:
    image: confluentinc/cp-kafka:8.0.4
    container_name: kafka
    ports:
      - "9092:9092"

    environment:
      KAFKA_KRAFT_MODE: 'true' # Allow Kafka to manage metadata and orchestrate brokers

      CLUSTER_ID: '1a'
      KAFKA_NODE_ID: 1 #Deploy 1 broker cluster, it will also be the controller

      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1 #There is only 1 copy of the kafka metadata that keeps track of which messages each consumer has red
      #  Setting this value to 1 meaning if kafka goes down the metadata is lost, default is 3

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093 # 9092: Where kafka is accessible for consumers/producers 9093: Special endpoint for controller communication
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092 #Defines the address kafka tell client to connect to
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER #Tells controllers to use specific endpoint for controller-controller communication

      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs # Tells kafka where to store the data files,metadata...

    volumes:
      - kafka_kraft:/var/lib/kafka/data

volumes:
  kafka_kraft: